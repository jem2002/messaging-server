version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: messaging-db
    restart: always
    environment:
      MYSQL_DATABASE: messaging_system
      MYSQL_USER: messaging_app
      MYSQL_PASSWORD: messaging_app
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
